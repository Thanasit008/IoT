<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fish Feeder IoT</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- AUTH MODAL: ไม่ใช่ระบบ Login/สมัครสมาชิก แค่ใส่ "ไอดีเครื่อง" + "รหัส" ที่ตั้งไว้ใน .env ของ server -->
<div id="authModal" class="auth-overlay">

    <div class="auth-box card shadow">

        <div class="card-body">

            <h4 class="mb-3 text-center">🔒 เข้าใช้งานเครื่อง</h4>

            <form id="authForm">

                <div class="mb-3">
                    <label class="form-label">ไอดีเครื่อง (Device ID)</label>
                    <input id="authDeviceId" type="text" class="form-control" required autocomplete="off">
                </div>

                <div class="mb-3">
                    <label class="form-label">รหัส (Access Code)</label>
                    <input id="authDeviceCode" type="password" class="form-control" required autocomplete="off">
                </div>

                <div id="authError" class="text-danger mb-3 small"></div>

                <button type="submit" class="btn btn-primary w-100">เข้าใช้งาน</button>

            </form>

        </div>

    </div>

</div>

<nav class="navbar navbar-dark bg-primary shadow">

    <div class="container-fluid">

        <span class="navbar-brand mb-0 h1">

            🐟 Fish Feeder IoT Dashboard

        </span>

        <button id="logoutBtn" class="btn btn-outline-light btn-sm">ออกจากระบบ</button>

    </div>

</nav>

<div class="container py-4">

<div class="row g-4">

<!-- STATUS -->

<div class="col-lg-4">

<div class="card shadow">

<div class="card-header">

Status

</div>

<div class="card-body">

<h2 id="statusText" class="text-danger">

OFFLINE

</h2>

<hr>

<p>

Last Update

</p>

<p id="lastSeen">

-

</p>

</div>

</div>

</div>

<!-- FOOD -->

<div class="col-lg-4">

<div class="card shadow">

<div class="card-header">

Food Remaining

</div>

<div class="card-body">

<h1>

<span id="weight">

0

</span>

g

</h1>

<div class="progress">

<div

id="foodBar"

class="progress-bar bg-success"

style="width:0%">

0%

</div>

</div>

<div class="mt-3">

<div class="d-flex justify-content-between align-items-center">

<span id="foodStatusLabel" class="fw-bold text-success">ปกติ</span>

<span id="daysRemainingText">0 วัน</span>

</div>

<label class="form-label mt-2">Daily Usage (g/day)</label>

<input id="dailyUsage" type="number" class="form-control" value="100" min="1">

<button id="saveUsageBtn" class="btn btn-outline-primary mt-2 w-100">Save Daily Usage</button>

</div>

</div>

</div>

</div>

<!-- CONTROL -->

<div class="col-lg-4">

<div class="card shadow">

<div class="card-header">

Control

</div>

<div class="card-body">

<label>

Amount (Gram)

</label>

<input

id="feedAmount"

type="number"

class="form-control"

value="30">

<div class="mt-3 d-grid gap-2">

<button

id="feedBtn"

class="btn btn-success">

🍽 Feed

</button>

<button

id="stopBtn"

class="btn btn-danger">

■ Stop

</button>

</div>

</div>

</div>

</div>

<!-- SCHEDULE -->

<div class="col-lg-6">

<div class="card shadow">

<div class="card-header">

Schedule

</div>

<div class="card-body">

<div class="row">

<div class="col">

<input

type="time"

id="scheduleTime"

class="form-control">

</div>

<div class="col-auto">

<button

id="addSchedule"

class="btn btn-primary">

Add

</button>

</div>

</div>

<hr>

<ul

id="scheduleList"

class="list-group">

</ul>

</div>

</div>

</div>

<!-- ALERT -->

<div class="col-lg-6">

<div class="card shadow">

<div class="card-header">

Alerts

</div>

<div class="card-body">

<ul

id="alertList"

class="list-group">

</ul>

</div>

</div>

</div>

<!-- HISTORY -->

<div class="col-12">

<div class="card shadow">

<div class="card-header d-flex justify-content-between">

<span>

History

</span>

<button

id="clearHistory"

class="btn btn-danger btn-sm">

Clear

</button>

</div>

<div class="table-responsive">

<table class="table table-striped">

<thead>

<tr>

<th>

Date

</th>

<th>

Amount

</th>

<th>

Mode

</th>

</tr>

</thead>

<tbody id="historyTable">

</tbody>

</table>

</div>

</div>

</div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="app.js"></script>

</body>

</html>
